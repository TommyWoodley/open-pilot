version: 1
id: install-builtin-skills-on-codex-select
description: Install built-in skills into ~/.codex/skills when codex is selected
triggers:
  - provider.codex.selected
execute:
  - builtin="${OPEN_PILOT_BUILTIN_SKILLS_DIR:-}"; [ -n "$builtin" ] || exit 1; mkdir -p "$builtin"; superpowers="$(dirname "$builtin")/superpowers"; dest="$HOME/.codex/skills"; mkdir -p "$dest"; for root in "$builtin" "$superpowers"; do [ -d "$root" ] || continue; for d in "$root"/*; do [ -d "$d" ] || continue; skill_name="$(basename "$d")"; rm -rf "$dest/$skill_name" || exit 1; cp -a "$d" "$dest/$skill_name" || exit 1; done; done
timeout: 30s
