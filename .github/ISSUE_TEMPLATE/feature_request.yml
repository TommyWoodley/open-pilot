name: Feature request
description: Suggest an improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What problem are you trying to solve?
      placeholder: Describe the problem or friction
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
      placeholder: Describe the change you want
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives or context (optional)
      description: Share alternatives, constraints, or extra context.
      placeholder: Optional extra details
    validations:
      required: false
